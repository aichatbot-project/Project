# Phase 1: PostgreSQL only. Run Django and Next.js locally.
# Later: add backend + frontend services for full docker-compose up.
services:
  db:
    image: postgres:15-alpine
    container_name: acu-chatbot-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acu_secret}
      POSTGRES_DB: ${POSTGRES_DB:-acu_chatbot}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acu} -d ${POSTGRES_DB:-acu_chatbot}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
